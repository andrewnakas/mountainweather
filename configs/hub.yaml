# Hugging Face Hub destinations. All data + model artifacts live here (per project
# decision). Create these repos with scripts/hf_setup.py (uses HF_TOKEN or the
# logged-in HF CLI credentials).

hf_namespace: "nakas"

datasets:
  training:   "nakas/mtnwx-training"    # parquet training shards (HRRR x obs x terrain)
  stations:   "nakas/mtnwx-stations"    # station catalogue + terrain features
  verify:     "nakas/mtnwx-verify"      # NBM/baseline extractions for verification

models:
  repo:       "nakas/mtnwx-models"      # versioned LightGBM artifacts + metadata

space:
  demo:       "nakas/mtnwx-demo"        # Gradio/static demo Space (forecast map + skill report)

# Existing user HF datasets to inventory/reuse (fill in if any).
existing_datasets: []
