# Hugging Face Hub destinations. All data + model artifacts live here (per project
# decision). Repo IDs are placeholders under the user's HF namespace — set the real
# namespace at M0 once the HF handle is known, and create these repos with
# scripts/hf_setup.py.

hf_namespace: "tree60weather"            # TODO(M0): confirm actual HF username/org

datasets:
  training:   "tree60weather/mtnwx-training"    # parquet training shards (HRRR x obs x terrain)
  stations:   "tree60weather/mtnwx-stations"    # station catalogue + terrain features
  verify:     "tree60weather/mtnwx-verify"      # NBM/baseline extractions for verification

models:
  repo:       "tree60weather/mtnwx-models"      # versioned LightGBM artifacts + metadata

space:
  demo:       "tree60weather/mtnwx-demo"        # Gradio/static demo Space (forecast map + skill report)

# Existing user HF datasets to inventory/reuse (fill in at M0).
existing_datasets: []
