# LightGBM hyperparameters for the post-processor. One model per (variable, quantile),
# with lead_time as a feature and optional per-lead-group splitting. These are sane
# starting points tuned for tabular NWP post-processing; refine at M4/M9 via CV.

lgbm:
  num_leaves: 63
  learning_rate: 0.03
  n_estimators: 1500
  min_child_samples: 200
  subsample: 0.8
  subsample_freq: 1
  colsample_bytree: 0.8
  reg_lambda: 1.0
  max_depth: -1
  early_stopping_rounds: 100
  n_jobs: -1
  verbose: -1

# Split models by lead group if it verifies better than a single lead-aware model.
# Empty list => single model per variable with lead_time as a feature.
lead_groups: []            # e.g. [[1,6],[7,12],[13,24],[25,48]]

# Two-stage precip/snow: occurrence threshold (mm or cm) above which "event" = 1.
two_stage:
  precip_threshold_mm: 0.2
  snow_threshold_cm: 0.5

# Training memory controls (16 GB Actions runner).
training:
  dtype: float32
  max_rows_per_fit: null   # null = use all; set an int to subsample very large targets
